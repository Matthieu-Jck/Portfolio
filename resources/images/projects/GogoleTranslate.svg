<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">GogoleTranslate project preview</title>
  <desc id="desc">A stylized preview for the GogoleTranslate AI writing assistant.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07182b"/>
      <stop offset="50%" stop-color="#0c3454"/>
      <stop offset="100%" stop-color="#12395e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#effcff"/>
      <stop offset="100%" stop-color="#d8f6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e4ff"/>
      <stop offset="100%" stop-color="#2cb0ff"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="810" fill="url(#bg)"/>
